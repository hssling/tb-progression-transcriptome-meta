name: hf-space-sync

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "deploy/huggingface_space/**"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate required secrets
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ secrets.HF_SPACE_ID }}
        run: |
          if [ -z "$HF_TOKEN" ] || [ -z "$HF_SPACE_ID" ]; then
            echo "HF_TOKEN and HF_SPACE_ID secrets are required."
            exit 1
          fi
      - name: Setup git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ secrets.HF_SPACE_ID }}
        run: |
          python -m pip install huggingface_hub
          huggingface-cli login --token "$HF_TOKEN"
          huggingface-cli repo create "$HF_SPACE_ID" --type space --space_sdk streamlit --yes || true
          git clone "https://user:$HF_TOKEN@huggingface.co/spaces/$HF_SPACE_ID" hf-space
          cp -r deploy/huggingface_space/* hf-space/
          cd hf-space
          git add .
          git commit -m "Sync Space app" || true
          git push
