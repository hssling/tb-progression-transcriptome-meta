name: Weekly Pipeline

on:
  schedule:
    - cron: "0 4 * * 0"
  workflow_dispatch:

jobs:
  run-weekly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run pipeline
        env:
          TBMETA_FULL_RUN: ${{ secrets.TBMETA_FULL_RUN }}
        run: |
          if [ -n "$TBMETA_FULL_RUN" ]; then
            tbmeta all --config configs/config.yaml --mode full --force
          else
            tbmeta all --config configs/config.yaml --mode demo --force
          fi
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: weekly-results
          path: |
            results/
            manuscripts/
            data/registry/
